// Subnet support file
// Format is:
// subnet: net-submask:char_ip:map_ip
// you can add more than one subnet (max 16)
// check is if((net-submask & char_ip ) == (net-submask & servip)) => ok

// LAN-only override: clients with source IP in 192.168.1.0/24 receive
// char_ip 192.168.1.135 (this box's LAN IP) instead of the public playit IP.
// External clients via playit appear as 127.0.0.1 — they don't match this
// subnet, so they correctly get the public char_ip from char_athena.conf.
// Local LAN testing works without breaking remote.
subnet: 255.255.255.0:192.168.1.135:192.168.1.135
