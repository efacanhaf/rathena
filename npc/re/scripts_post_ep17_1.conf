// --------------------------------------------------------------
// -            Episode 17.1 lockdown — quest list              -
// --------------------------------------------------------------
//
// Script-side leg of the "feels like Episode 17.1" lockdown.
// The C++ side (src/custom/ep17_1.hpp + defines_pre.hpp) handles
// 4th jobs / maps / mobs / items. Quest scripts live in NPC files
// loaded via `import:` lines in scripts_main.conf, which has no
// preprocessor — so we cannot conditionally compile them out.
//
// Convention used here: this file is the SINGLE place where every
// post-Ep-17.1 quest import is centralised. To re-enable post-17.1
// content, comment out the line that imports this file in
// npc/re/scripts_main.conf:
//
//     import: npc/re/scripts_post_ep17_1.conf
//
// To re-enable everything: comment that import line.
// To re-enable a single quest: copy its `npc:` line back into the
// appropriate scripts_*.conf and remove the entry below.
//
// --------------------------------------------------------------
//
// As of branch creation (2026-04-28), the master scripts_main.conf
// only exposes broad categories (quests/, jobs/, instances/) without
// per-quest gating. Populating this file requires walking each
// post-17.1 quest folder and listing its npc files. Until that audit
// is complete, the C++ lockdown still prevents 4th-job changes,
// post-17.1 mob spawns, item use, and map entry — so post-17.1
// quests that depend on those are already unreachable in practice.
//
// TODO: enumerate per-quest files. Examples to add when audited:
//   npc: npc/re/quests/ep17_2_sage_of_magic/...
//   npc: npc/re/quests/ep18_tirfing/...
//   npc: npc/re/quests/ep19_wandering/...
//   npc: npc/re/quests/ep20_iceflow/...
//   npc: npc/re/quests/ep21_demonio/...
